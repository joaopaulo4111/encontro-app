<div class="screen-container slide-in-right">
  <app-progress-bar 
    [currentStep]="4" 
    [totalSteps]="6" 
    stepLabel="Comidas"
  ></app-progress-bar>

  <div class="screen-wrapper">
    <!-- Screen Header -->
    <div class="screen-header">
      <h2 class="screen-title">E para comer? 😋</h2>
      <p class="screen-subtitle">Selecione tudo que você gosta</p>
    </div>

    <!-- Screen Content -->
    <div class="screen-content">
      <!-- Grid of food choices -->
      <div class="foods-grid">
        @for (option of foodOptions; track option.label) {
          <div class="stagger-item">
            <app-checkbox-card
              [label]="option.label"
              [icon]="option.icon"
              [selected]="isFoodSelected(option.label)"
              (toggle)="toggleFood(option.label)"
            ></app-checkbox-card>
          </div>
        }
      </div>

      <!-- Custom Input for "Outros" -->
      @if (showCustomInput) {
        <div class="custom-input-container">
          <input
            type="text"
            class="text-input custom-text-input"
            placeholder="Qual comida?"
            maxlength="80"
            [value]="formService.customFood()"
            (input)="formService.customFood.set($any($event.target).value)"
            aria-label="Descreva a outra comida"
          />
          <div class="counter-row">
            <span class="char-count">{{ formService.customFood().length }} / 80</span>
          </div>
        </div>
      }

      <!-- Subtle warning when nothing is selected -->
      @if (isSelectionEmpty) {
        <div class="subtle-warning stagger-item" role="status">
          Você não selecionou nada — tudo bem!
        </div>
      }
    </div>

    <!-- Actions buttons footer -->
    <div class="screen-footer stagger-item">
      <button type="button" class="btn btn-outline" (click)="onBackClick()">
        Voltar
      </button>
      <button 
        type="button" 
        class="btn btn-primary" 
        (click)="onNextClick()"
      >
        Próximo
      </button>
    </div>
  </div>
</div>
